services:
  rabbitmq:
      image: rabbitmq:3-management
      environment:
      - RABBITMQ_DEFAULT_USER=zuma_admin
      - RABBITMQ_DEFAULT_PASS=moje_tajne_heslo_123
      ports:
      - "5672:5672"   
      - "15672:15672"

  email-worker:
    build:
      context: .
      dockerfile: ZUMA.EmailService/Dockerfile
    ports:
     - "8082:8080"
    depends_on:
      - rabbitmq
    environment:
      - ConnectionStrings__RabbitMq=rabbitmq://rabbitmq
      - MT_LICENSE=community
      - ASPNETCORE_HTTP_PORTS=8080

  data-cleaner-worker:
    build:
      context: .
      dockerfile: ZUMA.EmailService/Dockerfile
    ports:
     - "8081:8080"
    environment:
     - MT_LICENSE=community
     - ASPNETCORE_HTTP_PORTS=8080

  zuma.api:
    image: ${DOCKER_REGISTRY-}zumaapi
    build:
      context: .
      dockerfile: ZUMA.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - MT_LICENSE=community
    restart: always
 
  zuma-db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    environment:
      MSSQL_SA_PASSWORD: "ZumaStrongPassword2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

volumes:
  mssql_data:
      
