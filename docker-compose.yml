services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: zuma-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=zuma_admin
      - RABBITMQ_DEFAULT_PASS=moje_tajne_heslo_123
    ports:
      - "5672:5672"   # RabbitMQ port
      - "15672:15672" # Management UI

  communication-service:
    build:
      context: .
      dockerfile: ZUMA.CommunicationService/Dockerfile
    container_name: communication-service
    depends_on:
      - rabbitmq
    ports:
      - "8081:8081" # Mapujeme VNĚJŠÍ 8082 na VNITŘNÍ 8081 (ten tvůj TCP Listener)
    environment:
      - RABBITMQ_HOST=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Development

  customer-service:
    build:
      context: .
      dockerfile: ZUMA.CustomerService/Dockerfile # TADY jsi měl chybu, odkazoval jsi na EmailService
    container_name: customer-service
    depends_on:
      - rabbitmq
    ports:
      - "8082:8081" # Mapujeme VNĚJŠÍ 8081 na VNITŘNÍ 8081
    environment:
      - RABBITMQ_HOST=rabbitmq
      - ASPNETCORE_ENVIRONMENT=Development

  zuma.api:
    build:
      context: .
      dockerfile: ZUMA.API/Dockerfile
    container_name: zuma-api
    ports:
      - "8080:8080" # JEN API má port 8080, teď už nebude kolize
    depends_on:
      - zuma-db
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: always

  zuma-db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: zuma-db
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped
    environment:
      - MSSQL_SA_PASSWORD=ZumaStrongPassword2026!
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"

volumes:
  mssql_data: