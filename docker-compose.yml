version: '3.8'

networks:
  zuma-network:
    driver: bridge
  proxy-nw:
    external: true

services:
  zuma-db:
    image: postgres:latest
    container_name: zuma-db
    networks:
      - zuma-network
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: zuma-rabbitmq
    networks:
      - zuma-network
      - proxy-nw
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"

  zuma-api:
    image: ghcr.io/${GITHUB_REPO_LOWER}/zuma-api:latest
    container_name: zuma-api
    networks:
      - zuma-network
      - proxy-nw
    depends_on:
      - zuma-db
      - rabbitmq
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - RabbitMQ__Username=${RABBIT_USER}
      - RabbitMQ__Password=${RABBIT_PASS} 
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
  

  communication-service:
    image: ghcr.io/${GITHUB_REPO_LOWER}/communication-service:latest
    container_name: communication-service
    networks:
      - zuma-network
    depends_on:
      - rabbitmq
    restart: always
    environment:
      - RABBITMQ_HOST=zuma-rabbitmq
      - RabbitMQ__Username=${RABBIT_USER}
      - RabbitMQ__Password=${RABBIT_PASS}
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - ConnectionStrings__DbConnection=Host=zuma-db;Port=5432;Database=zuma-communication;Username=${DB_USER};Password=${DB_PASSWORD}

  customer-service:
    image: ghcr.io/${GITHUB_REPO_LOWER}/customer-service:latest
    container_name: customer-service
    networks:
      - zuma-network
    depends_on:
      - rabbitmq
    restart: always
    environment:
      - RABBITMQ_HOST=rabbitmq
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      -  ConnectionStrings__DbConnection=Host=zuma-db;Port=5432;Database=zuma-customer;Username=${DB_USER};Password=${DB_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}

  pgadmin:
    image: dpage/pgadmin4
    container_name: zuma-pgadmin
    networks:
      - zuma-network
      - proxy-nw
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - zuma-db

volumes:
  postgres_data: