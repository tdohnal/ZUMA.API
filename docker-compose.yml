networks:
  zuma-network:
    driver: bridge
  proxy-nw:
    external: true

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: zuma-npm
    restart: always
    ports:
      - '80:80'    # Standardní HTTP
      - '81:81'    # Admin panel NPM (tohle si pamatuj!)
      - '443:443'  # Standardní HTTPS
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - zuma-network
      - proxy-nw

  portainer:
    image: portainer/portainer-ce:latest
    container_name: zuma-portainer
    restart: always
    # Porty 9443 a 8000 už nepotřebuješ venku, NPM to vyřeší vnitřkem
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - zuma-network

  zuma-api:
    image: ghcr.io/${GITHUB_REPO_LOWER}/zuma-api:latest
    container_name: zuma-api
    restart: always
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DbConnection=Host=zuma-db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS}
      - SERILOG__SEQ__URL=http://zuma-seq:5341
      - RABBITMQ__HOST=zuma-rabbitmq
    networks:
      - zuma-network

  zuma-db:
    image: postgres:latest
    container_name: zuma-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zuma-network

  zuma-seq:
    image: datalust/seq:latest
    container_name: zuma-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_PASS}
    volumes:
      - seq_data:/data
    networks:
      - zuma-network

  zuma-rabbitmq:
    image: rabbitmq:3-management
    container_name: zuma-rabbitmq
    restart: always
    networks:
      - zuma-network

  zuma-pgadmin:
    image: dpage/pgadmin4
    container_name: zuma-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASS}
    networks:
      - zuma-network

  zuma-mailpit:
    image: axllent/mailpit
    container_name: zuma-mailpit
    restart: always
    networks:
      - zuma-network

volumes:
  postgres_data:
  seq_data:
  portainer_data: