name: Sandbox Deploy

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ZUMA
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.API/Dockerfile
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.NUGET_GITHUB_TOKEN }}
          tags: ghcr.io/${{ github.repository_owner }}/zuma-api:latest

      - name: Build and push Communication Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.CommunicationService/Dockerfile
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.NUGET_GITHUB_TOKEN }}
          tags: ghcr.io/${{ github.repository_owner }}/communication-service:latest

      - name: Build and push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.CustomerService/Dockerfile
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.NUGET_GITHUB_TOKEN }}
          tags: ghcr.io/${{ github.repository_owner }}/customer-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ZUMA
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml"
          target: "~/zuma"

      - name: Run Docker Compose via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/zuma
            
            # Vytvoření .env souboru z tvých Environment Secrets
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "RABBIT_HOST=${{ secrets.RABBIT_HOST }}" >> .env
            echo "RABBIT_USER=${{ secrets.RABBIT_USER }}" >> .env
            echo "RABBIT_PASS=${{ secrets.RABBIT_PASS }}" >> .env
            echo "PGADMIN_EMAIL=${{ secrets.PGADMIN_EMAIL }}" >> .env
            echo "PGADMIN_PASS=${{ secrets.PGADMIN_PASS }}" >> .env
            echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env
            echo "JWT_ISSUER=${{ secrets.JWT_ISSUER }}" >> .env
            echo "JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}"  >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}"  >> .env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}"  >> .env
            echo "SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}"  >> .env
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}"  >> .env
            echo "SMTP_SENDER=${{ secrets.SMTP_SENDER }}"  >> .env
            echo "SMTP_SENDER_NAME=${{ secrets.SMTP_SENDER_NAME }}"  >> .env
            echo "APP_ENV=Sandbox" >> .env
            
            REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            echo "GITHUB_REPO_LOWER=$REPO_LOWER" >> .env

            # Přihlášení k registru na serveru
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker network create proxy-nw || true
            docker compose pull
            docker compose up -d
