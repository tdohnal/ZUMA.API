name: Sandbox Deploy

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. Příprava metadat
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_ver: ${{ steps.timestamp.outputs.BUILD_VER }}
    steps:
      - id: timestamp
        run: echo "BUILD_VER=$(date +'%Y.%m%d.%H%M')" >> $GITHUB_OUTPUT

  # 2. SPUŠTĚNÍ TESTŮ - Pokud tohle selže, zbytek se nespustí
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Uprav podle své verze (.NET 8/9)

      - name: Restore dependencies
        run: dotnet restore
        env:
          # Pokud používáš GitHub NuGet feed, potřebuješ token
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_GITHUB_TOKEN }}

      - name: Build tests
        run: dotnet build --no-restore

      - name: Run all tests
        # Spustí všechny projekty končící na .Tests
        run: dotnet test --no-build --verbosity normal

  # 3. BUILD A PUSH - Teď závisí i na 'run-tests'
  build-and-push:
    needs: [prepare, run-tests] # Změna: musí projít testy i příprava
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: "API"
            context: "."
            dockerfile: "ZUMA.API/Dockerfile"
            image: "zuma-api"
          - service_name: "Communication"
            context: "."
            dockerfile: "ZUMA.CommunicationService/Dockerfile"
            image: "communication-service"
          - service_name: "Customer"
            context: "."
            dockerfile: "ZUMA.CustomerService/Dockerfile"
            image: "customer-service"
    
    permissions:
      contents: read
      packages: write
    environment: ZUMA

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ${{ matrix.service_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.NUGET_GITHUB_TOKEN }}
            APP_VERSION=${{ needs.prepare.outputs.build_ver }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ needs.prepare.outputs.build_ver }}

  # DEPLOY JOB: Provede update na serveru
  deploy:
    needs: build-and-push
    if: always() # Spustí se i když některý build selhal (aby nasadil ty povedené)
    runs-on: ubuntu-latest
    environment: ZUMA
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: "~/zuma"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/zuma
            
            # Generování .env
            cat <<EOF > .env
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=${{ secrets.DB_NAME }}
            RABBIT_HOST=${{ secrets.RABBIT_HOST }}
            RABBIT_USER=${{ secrets.RABBIT_USER }}
            RABBIT_PASS=${{ secrets.RABBIT_PASS }}
            PGADMIN_EMAIL=${{ secrets.PGADMIN_EMAIL }}
            PGADMIN_PASS=${{ secrets.PGADMIN_PASS }}
            JWT_KEY=${{ secrets.JWT_KEY }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_SENDER=${{ secrets.SMTP_SENDER }}
            SMTP_SENDER_NAME=${{ secrets.SMTP_SENDER_NAME }}
            SEQ_PASS=${{ secrets.SEQ_PASS }}
            APP_ENV=Sandbox
            GITHUB_REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            EOF

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker network create proxy-nw || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
