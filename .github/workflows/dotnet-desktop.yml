name: Deploy to VM

on:
  push:
    branches: [ master ]  

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build and restart Docker locally
      run: |
        cd $GITHUB_WORKSPACE   # složka, kde runner checkoutnul repo

        # zastavit a smazat starý kontejner, pokud existuje
        if [ $(docker ps -aq -f name=mk-app) ]; then
          echo "Stopping and removing old container..."
          docker stop mk-app || true
          docker rm mk-app || true
        fi

        # build image
        echo "Building Docker image..."
        docker build -t eshop_mk .

        # spustit nový kontejner na portu 5000
        echo "Starting Docker container..."
        docker run -d --restart always --name mk-app -p 5000:80 eshop_mk

    - name: Verify container is running
      run: |
        docker ps
