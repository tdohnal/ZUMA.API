name: Deploy to host

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build and restart Docker locally
      # Na Windows self-hosted nepoužíváme "shell: bash", 
      # abychom nevyžadovali WSL. PowerShell je výchozí.
      env:
        MY_TOKEN: ${{ secrets.NUGET_GITHUB_TOKEN }}
      run: |
        # 1. Zjistíme, jestli kontejner běží (PowerShell syntax)
        $container = docker ps -aq -f "name=mk-app"
        
        if ($container) {
            Write-Host "Stopping and removing old container..."
            # Zastavíme a smažeme (chyby ignorujeme přes SilentlyContinue)
            docker stop mk-app 2>$null
            docker rm mk-app 2>$null
        }

        # 2. Build obrazu
        Write-Host "Building Docker image..."
        docker build --build-arg GH_TOKEN="${env:MY_TOKEN}" -t eshop_mk .

        # 3. Spuštění nového kontejneru
        Write-Host "Starting Docker container..."
        docker run -d --restart always --name mk-app -p 5000:80 eshop_mk

    - name: Verify container is running
      run: docker ps
