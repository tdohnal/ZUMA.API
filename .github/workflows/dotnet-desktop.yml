name: Production Deploy

on:
  push:
    branches: [ "main", "master" ] # Spustí se při pushi do main nebo master

jobs:
  build-and-push:
    # TADY BYLA CHYBA - musí tu být ubuntu-latest, ne self-hosted
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.API/Dockerfile
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: ghcr.io/${{ github.repository_owner }}/zuma-api:latest

      - name: Build and push Communication Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.CommunicationService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/communication-service:latest

      - name: Build and push Customer Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ZUMA.CustomerService/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/customer-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml"
          target: "~/zuma"

      - name: Run Docker Compose via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/zuma
            
            # Vytvoření .env souboru z tvých Secrets
            echo "DB_USER=${{ secrets.DB_USER }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
            echo "RABBIT_USER=${{ secrets.RABBIT_USER }}" >> .env
            echo "RABBIT_PASSWORD=${{ secrets.RABBIT_PASSWORD }}" >> .env
            echo "PGADMIN_EMAIL=${{ secrets.PGADMIN_EMAIL }}" >> .env
            echo "PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}" >> .env
            echo "APP_ENV=Production" >> .env
            
            # Oprava názvu repozitáře na malá písmena pro Docker
            REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            echo "GITHUB_REPO_LOWER=$REPO_LOWER" >> .env

            # Přihlášení k registru na tvém Contabu
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Spuštění sítě a kontejnerů
            docker network create proxy-nw || true
            docker compose pull
            docker compose up -d
