name: CI - Build, Test and Coverage

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: ZUMA
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Add NuGet Source and Auth
      # Vše na jednom řádku, aby GitHub neztratil parametry username a password
      run: dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --name "GitHub" --username "${{ github.actor }}" --password "${{ secrets.NUGET_GITHUB_TOKEN }}" --store-password-in-clear-text
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_GITHUB_TOKEN }}

    - name: Restore
      run: dotnet restore "ZUMA.API.slnx"
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_GITHUB_TOKEN }}

    - name: Build
      run: dotnet build "ZUMA.API.slnx" --no-restore

    - name: Test with Coverage
      run: |
        dotnet test "ZUMA.API.slnx" --no-build --verbosity normal \
        /p:CollectCoverage=true \
        /p:CoverletOutputFormat=cobertura \
        /p:CoverletOutput=./TestResults/ \
        /p:Exclude="[ZUMA.*.Migrations]*;[ZUMA.*]*.Program;[ZUMA.*.DTOs]*"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
