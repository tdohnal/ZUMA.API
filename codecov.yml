# Konfigurace limitů a vzhledu Codecov
coverage:
  status:
    project:
      default:
        target: 80%    # Celkové pokrytí projektu musí být aspoň 80 %
        threshold: 1%  # Tolerance (vypne fail, pokud to klesne jen o kousíček)
    patch:
      default:
        target: 80%    # Nový kód v tomto konkrétním PR musí být pokryt z 80 %

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false  # Toto je klíčové - mělo by to poslat tabulku vždy
